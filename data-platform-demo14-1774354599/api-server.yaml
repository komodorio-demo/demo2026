  labels:
    app: api-server
  name: api-server
  namespace: data-platform-demo14-1774354599
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
      - args:
        - |
          echo "[api-server] Starting v2.3.1..."
          echo "[api-server] Fetching runtime configuration from remote service..."
          echo "[api-server] Connecting to config-service (aws-network-issue-config-service) at ${CONFIG_SERVICE_HOST}:${CONFIG_SERVICE_PORT}..."
          if ! wget -T 10 -q \
              "http://${CONFIG_SERVICE_HOST}:${CONFIG_SERVICE_PORT}/api/v1/config" \
              -O /tmp/config 2>/tmp/err; then
            echo "[api-server] ERROR: Failed to reach configuration service EC2 at ${CONFIG_SERVICE_HOST}:${CONFIG_SERVICE_PORT}"
            echo "[api-server] ERROR: $(cat /tmp/err 2>/dev/null || echo 'connection timed out')"
            echo "[api-server] FATAL: Cannot start without remote configuration. Exiting."
            exit 1
          fi
          echo "[api-server] Configuration loaded successfully. Service is running."
          while true; do sleep 3600; done
        command:
        - /bin/sh
        - -c
        env:
        - name: CONFIG_SERVICE_HOST
          value: 172.26.66.104
        - name: CONFIG_SERVICE_PORT
          value: "8080"
        image: public.ecr.aws/docker/library/busybox:1.36
        name: api-server
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi