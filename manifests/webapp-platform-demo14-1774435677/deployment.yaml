apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp-platform-demo14-1774435677
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80