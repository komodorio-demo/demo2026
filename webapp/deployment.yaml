apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp-platform-demo21-1776843180
spec:
  replicas: 4
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: webapp
  strategy:
    rollingUpdate:
      maxSurge: 1          # Add 1 pod at a time during updates
      maxUnavailable: 0    # Zero downtime deployments
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: webapp
        version: v1.27.2   # Track nginx version for observability
    spec:
      # Spread pods across nodes for HA
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: webapp
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: webapp
      
      containers:
      - name: nginx
        image: nginx:1.27.2  # Pinned version for predictability
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        # Resource management - prevents resource exhaustion
        resources:
          requests:
            cpu: 100m        # Guaranteed CPU
            memory: 128Mi    # Guaranteed memory
          limits:
            cpu: 500m        # Max CPU burst
            memory: 256Mi    # Max memory before OOM
        
        # Health checks - automatic recovery
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15 && nginx -s quit"]
        
        # Security best practices
        securityContext:
          runAsNonRoot: true
          runAsUser: 101  # nginx user
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
          readOnlyRootFilesystem: true
        
        # Writable directories for nginx
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
      
      # Security context for pod
      securityContext:
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      
      terminationGracePeriodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webapp-pdb
  namespace: webapp-platform-demo21-1776843180
spec:
  minAvailable: 3  # Keep 3/4 pods available during disruptions
  selector:
    matchLabels:
      app: webapp
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webapp-hpa
  namespace: webapp-platform-demo21-1776843180
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webapp
  minReplicas: 4
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up at 70% CPU
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale up at 80% memory
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60  # Scale up by 50% max per minute
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60  # Scale down 1 pod per minute
