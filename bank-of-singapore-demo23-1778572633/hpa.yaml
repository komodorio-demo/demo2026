apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: strimzi-cluster-operator-hpa
  namespace: bank-of-singapore-demo23-1778572633
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: strimzi-cluster-operator
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80