name: Cleanup Old Komodor Bot PRs

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Log matching PRs without closing them
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  cleanup-komodor-bot-prs:
    runs-on: ubuntu-latest
    env:
      CLOSE_AFTER_DAYS: '4'
      TARGET_AUTHOR: komodor-bot
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    steps:
      - name: Close stale PRs opened by komodor-bot
        uses: actions/github-script@v9
        with:
          script: |
            const closeAfterDays = Number(process.env.CLOSE_AFTER_DAYS || '4');
            const targetAuthor = (process.env.TARGET_AUTHOR || 'komodor-bot').toLowerCase();
            const dryRun = String(process.env.DRY_RUN || 'false').toLowerCase() === 'true';
            const cutoff = Date.now() - closeAfterDays * 24 * 60 * 60 * 1000;

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const staleBotPulls = openPulls.filter((pull) => {
              const author = (pull.user?.login || '').toLowerCase();
              const createdAt = new Date(pull.created_at).getTime();

              return (
                (author === targetAuthor || author === `${targetAuthor}[bot]`) &&
                createdAt <= cutoff
              );
            });

            if (staleBotPulls.length === 0) {
              core.info(`No open PRs from ${targetAuthor} older than ${closeAfterDays} days.`);
              return;
            }

            if (dryRun) {
              core.info(`Dry run enabled. ${staleBotPulls.length} PR(s) would be closed.`);
            }

            for (const pull of staleBotPulls) {
              core.info(
                `${dryRun ? 'Would close' : 'Closing'} PR #${pull.number} (${pull.title}) opened by ${pull.user.login}.`
              );

              if (dryRun) {
                continue;
              }

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pull.number,
                state: 'closed',
              });
            }

            core.info(`${dryRun ? 'Matched' : 'Closed'} ${staleBotPulls.length} stale PR(s).`);
