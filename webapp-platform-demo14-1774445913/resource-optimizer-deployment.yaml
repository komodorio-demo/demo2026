apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    app: resource-optimizer
    component: infrastructure
  name: resource-optimizer
  namespace: webapp-platform-demo14-1774445913
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-optimizer
  template:
    metadata:
      labels:
        app: resource-optimizer
        component: infrastructure
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - echo 'Starting resource optimizer...' && sleep infinity
        image: busybox:1.36
        name: optimizer
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi