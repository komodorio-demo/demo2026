  namespace: bank-of-singapore-demo21-1776843180
spec:
  replicas: 2  # CHANGED: Increased from 1 to 2 for high availability
  selector:
    matchLabels:
      name: strimzi-cluster-operator
      strimzi.io/kind: cluster-operator
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # CHANGED: Ensures at least 1 replica is always available during updates
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: strimzi-cluster-operator
        strimzi.io/kind: cluster-operator
    spec:
      affinity:
        # NEW: Spread replicas across different nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  name: strimzi-cluster-operator
              topologyKey: kubernetes.io/hostname
      priorityClassName: system-cluster-critical  # NEW: Protect from preemption
      containers:
      - args:
        - /opt/strimzi/bin/cluster_operator_run.sh
        env:
        - name: STRIMZI_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STRIMZI_FULL_RECONCILIATION_INTERVAL_MS
          value: '120000'
        - name: STRIMZI_OPERATION_TIMEOUT_MS
          value: '300000'
        - name: STRIMZI_DEFAULT_KAFKA_EXPORTER_IMAGE
          value: quay.io/strimzi/kafka:0.51.0-kafka-4.2.0
        - name: STRIMZI_DEFAULT_CRUISE_CONTROL_IMAGE
          value: quay.io/strimzi/kafka:0.51.0-kafka-4.2.0
        - name: STRIMZI_KAFKA_IMAGES
          value: |
            4.1.0=quay.io/strimzi/kafka:0.51.0-kafka-4.1.0
            4.1.1=quay.io/strimzi/kafka:0.51.0-kafka-4.1.1
            4.2.0=quay.io/strimzi/kafka:0.51.0-kafka-4.2.0
        - name: STRIMZI_KAFKA_CONNECT_IMAGES
          value: |
            4.1.0=quay.io/strimzi/kafka:0.51.0-kafka-4.1.0
            4.1.1=quay.io/strimzi/kafka:0.51.0-kafka-4.1.1
            4.2.0=quay.io/strimzi/kafka:0.51.0-kafka-4.2.0
        - name: STRIMZI_KAFKA_MIRROR_MAKER_2_IMAGES
          value: |
            4.1.0=quay.io/strimzi/kafka:0.51.0-kafka-4.1.0
            4.1.1=quay.io/strimzi/kafka:0.51.0-kafka-4.1.1
            4.2.0=quay.io/strimzi/kafka:0.51.0-kafka-4.2.0
        - name: STRIMZI_DEFAULT_TOPIC_OPERATOR_IMAGE
          value: quay.io/strimzi/operator:0.51.0
        - name: STRIMZI_DEFAULT_USER_OPERATOR_IMAGE
          value: quay.io/strimzi/operator:0.51.0
        - name: STRIMZI_DEFAULT_KAFKA_INIT_IMAGE
          value: quay.io/strimzi/operator:0.51.0
        - name: STRIMZI_DEFAULT_KAFKA_BRIDGE_IMAGE
          value: quay.io/strimzi/kafka-bridge:0.33.1
        - name: STRIMZI_DEFAULT_KANIKO_EXECUTOR_IMAGE
          value: quay.io/strimzi/kaniko-executor:0.51.0
        - name: STRIMZI_DEFAULT_BUILDAH_IMAGE
          value: quay.io/strimzi/buildah:0.51.0
        - name: STRIMZI_DEFAULT_MAVEN_BUILDER
          value: quay.io/strimzi/maven-builder:0.51.0
        - name: STRIMZI_OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STRIMZI_FEATURE_GATES
          value: ""
        - name: STRIMZI_LEADER_ELECTION_ENABLED
          value: 'true'
        - name: STRIMZI_LEADER_ELECTION_LEASE_NAME
          value: strimzi-cluster-operator
        - name: STRIMZI_LEADER_ELECTION_LEASE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: STRIMZI_LEADER_ELECTION_IDENTITY
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: quay.io/strimzi/operator:0.51.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthy
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 5  # NEW: More tolerant to transient failures
        name: strimzi-cluster-operator
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        resources:
          limits:
            cpu: '1'
            memory: 512Mi  # CHANGED: Increased from 384Mi to 512Mi for burst handling
          requests:
            cpu: 200m
            memory: 384Mi
        volumeMounts:
        - mountPath: /tmp
          name: strimzi-tmp
        - mountPath: /opt/strimzi/custom-config/
          name: co-config-volume
      serviceAccountName: strimzi-cluster-operator
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 10Mi  # CHANGED: Increased from 1Mi to 10Mi
        name: strimzi-tmp
      - configMap:
          name: strimzi-cluster-operator
        name: co-config-volume
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: strimzi-cluster-operator
  namespace: bank-of-singapore-demo21-1776843180
  labels:
    app: strimzi
spec:
  minAvailable: 1  # NEW: Ensures at least 1 pod is available during disruptions
  selector:
    matchLabels:
      name: strimzi-cluster-operator
      strimzi.io/kind: cluster-operator
