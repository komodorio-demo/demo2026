---
# ArgoCD Application for KEDA installation only
# The payment-processor ScaledObject should be applied directly via kubectl
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    targetRevision: 2.15.1
    chart: keda
    helm:
      values: |
        # KEDA Operator values
        operator:
          replicaCount: 1
        metricsServer:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true