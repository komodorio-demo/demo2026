# KEDA Installation via kubectl
# Apply this file to install KEDA 2.15.1
# kubectl apply --server-side -f https://github.com/kedacore/keda/releases/download/v2.15.1/keda-2.15.1.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: keda-installation-guide
  namespace: keda
data:
  install.sh: |
    #!/bin/bash
    # Install KEDA 2.15.1
    kubectl apply --server-side -f https://github.com/kedacore/keda/releases/download/v2.15.1/keda-2.15.1.yaml
    
    # Wait for KEDA operator to be ready
    kubectl wait --for=condition=ready pod -l app=keda-operator -n keda --timeout=300s
    kubectl wait --for=condition=ready pod -l app=keda-metrics-apiserver -n keda --timeout=300s
    
    echo "KEDA installation complete"
    echo "Verify with: kubectl get pods -n keda"